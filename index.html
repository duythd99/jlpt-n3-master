<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JLPT N3 🌸 bé Tràm 🌸</title>
    
    <!-- Cấu hình hiển thị App và Icon trên iPhone -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JLPT N3">

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ĐỊNH NGHĨA BIẾN MÀU SẮC */
        :root[data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #e91e63;
            --primary-hover: #d81b60;
            --border-color: #333333;
            --blur-bg: #333333;
            --game-bg: #1a1a1a;
        }

        :root[data-theme="light"] {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --text-muted: #6e6e73;
            --primary: #e91e63;
            --primary-hover: #d81b60;
            --border-color: #e2e2e7;
            --blur-bg: #e8e8ed;
            --game-bg: #eaeaea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ĐÃ SỬA: Tiêu đề căn giữa tuyệt đối */
        .header-row {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }
        h1.title { font-size: 26px; margin: 0; color: var(--primary); font-weight: bold; }
        .subtitle { font-size: 18px; margin: 6px 0 0 0; color: var(--primary); font-weight: bold; }
        
        .theme-toggle-btn {
            position: absolute;
            right: 0;
            top: 4px;
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }

        .upload-box {
            border: 2px dashed #ffb7d2;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            background-color: rgba(233, 30, 99, 0.05);
        }
        .upload-box p { margin: 0 0 10px 0; font-size: 13px; color: var(--text-muted); }
        .file-input-label {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        #excel-file { display: none; }

        .controls-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        select { flex: 1; max-width: 280px; background-color: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 8px 10px; border-radius: 8px; font-size: 14px; }
        
        .bookmark-filter { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; color: var(--text-muted); margin: 4px 0; cursor: pointer; }

        .mode-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .mode-btn { background-color: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 2px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 500; }
        .mode-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        
        .view-list-btn { width: 100%; background-color: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: bold; }

        /* ĐÃ SỬA: Tăng kích thước thẻ và tối ưu hoá không gian để bớt trống trải */
        .flashcard { width: 100%; height: 380px; perspective: 1000px; margin: 5px 0; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.4s; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; padding: 25px 20px; box-sizing: border-box; background-color: var(--card-bg); border: 2px solid var(--border-color); }
        
        .flashcard-front { background-color: var(--primary); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotateY(0deg); -webkit-transform: rotateY(0deg); }
        
        /* ĐÃ SỬA: Dàn đều (space-around) các phần tử theo chiều dọc giúp lấp đầy khoảng trống */
        .flashcard-back { 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-around; 
            text-align: center; 
            transform: rotateY(180deg); 
            -webkit-transform: rotateY(180deg); 
            overflow-y: auto; 
        }
        
        .flashcard.flipped .flashcard-front { visibility: hidden; }
        .flashcard:not(.flipped) .flashcard-back { visibility: hidden; }

        .card-icon-top { position: absolute; top: 15px; font-size: 18px; cursor: pointer; z-index: 10; }
        .star-icon { left: 15px; }
        .eye-icon { right: 15px; font-size: 13px; }

        .word-main { font-size: 44px; font-weight: bold; margin: 0; }
        .audio-btn { background: #fff0f3; border: 1px solid #ffb3c6; color: var(--primary); border-radius: 50%; width: 32px; height: 32px; font-size: 14px; cursor: pointer; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }

        /* ĐÃ SỬA: Căn chỉnh lại khoảng cách và kích cỡ chữ trong thẻ */
        .fb-container-top { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
        .fb-hanviet { font-size: 26px; color: #ff85a2; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .fb-kana { font-size: 19px; color: var(--text-muted); font-weight: bold; margin: 0; display: flex; align-items: center; justify-content: center; }
        .fb-mean { font-size: 20px; font-weight: bold; margin: 5px 0; color: var(--text-color); }

        .blur-box { filter: blur(6px); background: var(--blur-bg); border-radius: 4px; padding: 2px 8px; cursor: pointer; color: transparent; display: inline-block; }
        .blur-box.revealed { filter: none; background: transparent; color: inherit; }

        .nav-buttons { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-btn { flex: 1; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .nav-btn.btn-secondary { background-color: #5c6bc0; max-width: 90px; }
        .counter { font-size: 14px; color: var(--primary); font-weight: bold; text-align: center; margin: 2px 0; }

        footer { display: flex; justify-content: center; gap: 15px; font-size: 13px; margin-top: 5px; }
        footer a { color: #ff85a2; text-decoration: none; font-weight: bold; }

        /* CÁC TAB KHÁC */
        .quiz-question { font-size: 42px; font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--primary); }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .quiz-option { padding: 12px; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 8px; cursor: pointer; font-size: 16px; text-align: center; }
        .quiz-option.correct { background: #1b5e20; border-color: #4caf50; color: white; }
        .quiz-option.wrong { background: #b71c1c; border-color: #f44336; color: white; }
        
        .game-area { position: relative; width: 100%; height: 260px; background: var(--game-bg); border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 2px solid var(--border-color); }
        .falling-word { position: absolute; font-size: 32px; font-weight: bold; color: var(--primary); left: 50%; transform: translateX(-50%); white-space: nowrap; }
        .game-input { width: 100%; padding: 10px; font-size: 16px; background-color: var(--card-bg); border: 2px solid var(--primary); border-radius: 6px; outline: none; color: var(--text-color); box-sizing: border-box; margin-bottom: 10px; }
        .score-board { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 10px; color: var(--primary); }

        .vocab-table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; }
        .vocab-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; white-space: nowrap; }
        .vocab-table th, .vocab-table td { padding: 8px; border-bottom: 1px solid var(--border-color); }
        .vocab-table th { background: var(--primary); color: white; position: sticky; top: 0; }

        @media only screen and (max-width: 430px) {
            body { 
                height: 100dvh!important; 
                overflow: hidden!important; 
                justify-content: flex-start; 
                padding: calc(10px + env(safe-area-inset-top)) 15px calc(10px + env(safe-area-inset-bottom)) 15px!important; 
            }
            .container { gap: 12px; }
            .flashcard { height: 350px !important; }
        }
    </style>
</head>
<body>

<!-- Tiêu đề mới đã căn giữa hoàn hảo -->
<div class="header-row">
    <h1 class="title">JLPT N3 🌸</h1>
    <div class="subtitle">🌸bé Tràm 🌸</div>
    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()">☀️</button>
</div>

<div class="container">
    <div class="upload-box">
        <p>Chọn file Excel chứa từ vựng cần học:</p>
        <label for="excel-file" class="file-input-label">📁 Nạp Excel Từ Vựng</label>
        <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="handleExcelUpload(event)">
    </div>

    <div class="controls-row">
        <label>Bài học:</label>
        <select id="lesson-select" onchange="loadSheet()"></select>
    </div>

    <label class="bookmark-filter">
        <input type="checkbox" id="only-bookmarked" onchange="toggleStarredFilter()"> ⭐ Từ cần chú ý
    </label>

    <div class="mode-buttons">
        <button class="mode-btn active" onclick="switchTab('tab-flashcard', this)">Flashcard</button>
        <button class="mode-btn" onclick="switchTab('tab-quiz', this)">Trắc Nghiệm</button>
        <button class="mode-btn" onclick="switchTab('tab-typing', this)">Gõ Từ</button>
        <button class="mode-btn" onclick="switchTab('tab-falling', this)">Kanji Rơi</button>
    </div>
    <button class="view-list-btn" onclick="switchTab('tab-manager', this)">Xem Danh Sách</button>

    <!-- TAB FLASHCARD -->
    <div id="tab-flashcard" class="tab-content" style="display: block;">
        <div class="flashcard" id="flashcard-container" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon" style="color: white;">👁️ 0</span>
                    <div class="word-main" id="fc-front-text">-</div>
                </div>
                
                <!-- Mặt sau thẻ đã được cấu trúc lại hoàn toàn để cân đối, căn giữa, giãn đều -->
                <div class="flashcard-back">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon">👁️ 0</span>
                    
                    <div class="fb-container-top">
                        <div class="fb-hanviet" id="fc-hanviet">-</div>
                        <div class="fb-kana">
                            <span id="fc-kana"></span>
                            <button class="audio-btn" onclick="speakCurrentWord(event)">🔊</button>
                        </div>
                    </div>
                    
                    <div class="fb-mean" id="fc-meaning">-</div>
                    
                    <div style="font-size: 14px; color: var(--primary); margin: 5px 0; display:none;" id="fc-same-box">
                        Từ đồng nghĩa: <span class="blur-box" id="fc-same" onclick="revealBlur(event, this)"></span>
                    </div>
                    
                    <div style="font-size:14px; border-top:1px dashed var(--border-color); padding-top:12px; width:100%; display: flex; flex-direction: column; align-items: center; gap: 4px;" id="fc-ex-box">
                        <div style="font-weight:bold;">Ví dụ: <button class="audio-btn" onclick="speakCurrentExample(event)">🔊</button></div>
                        <span id="fc-ex-jp" style="font-style:italic; font-size:15px; color: var(--text-color);"></span>
                        <span style="color:var(--text-muted);">Dịch: <span class="blur-box" id="fc-ex-vi" onclick="revealBlur(event, this)"></span></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevCard()">&larr; Trước</button>
            <button class="nav-btn btn-secondary" onclick="shuffleCards()">🔀 Trộn</button>
            <button class="nav-btn" onclick="nextCard()">Tiếp &rarr;</button>
        </div>
        <div class="counter" id="card-counter">0 / 0</div>
        <footer>
            <a id="fc-gemini" href="#" target="_blank">🔍 Tra Gemini</a>
            <span style="color:var(--border-color)">|</span>
            <a id="fc-mazii" href="#" target="_blank">📖 Từ điển Mazii</a>
        </footer>
    </div>

    <!-- CÁC TAB KHÁC -->
    <div id="tab-quiz" class="tab-content" style="display: none;">
        <div class="score-board"><span>Câu hỏi: <span id="quiz-counter">0/0</span></span><span>Điểm: <span id="quiz-score">0</span></span></div>
        <div class="quiz-question" id="quiz-q"></div>
        <div class="quiz-options" id="quiz-opts"></div>
        <button class="nav-btn" style="margin-top:15px; width:100%; display:none;" id="quiz-next-btn" onclick="nextQuiz()">Câu tiếp theo</button>
    </div>

    <div id="tab-typing" class="tab-content" style="display: none;">
        <div class="score-board"><span>Điểm: <span id="type-score">0</span></span></div>
        <div class="quiz-question" id="type-q"></div>
        <input type="text" id="type-input" class="game-input" placeholder="Gõ Kana hoặc Ý nghĩa..." onkeypress="checkTyping(event)">
        <p id="type-feedback" style="text-align:center; font-weight:bold; font-size:14px; height:20px;"></p>
    </div>

    <div id="tab-falling" class="tab-content" style="display: none;">
        <div class="score-board"><span>Điểm: <span id="fall-score">0</span></span><span style="color:#ff5252;">⏱️ <span id="fall-timer">30</span>s</span><span>❤️ <span id="fall-lives">3</span></span></div>
        <div class="game-area" id="fall-area"><div id="falling-word" class="falling-word" style="display: none;"></div></div>
        <input type="text" id="fall-input" class="game-input" placeholder="Gõ câu trả lời..." onkeypress="checkFall(event)">
        <button class="nav-btn" style="width:100%;" id="fall-start-btn" onclick="startFallingGame()">▶ Bắt đầu chơi</button>
    </div>

    <div id="tab-manager" class="tab-content" style="display: none;">
        <h3 id="manager-title" style="margin:5px 0; font-size:15px; color:var(--primary);">Danh sách</h3>
        <div class="vocab-table-wrapper">
            <table class="vocab-table">
                <thead><tr><th>Dòng</th><th>⭐</th><th>Từ vựng</th><th>Hán Việt</th><th>Cách đọc</th><th>Ý nghĩa</th></tr></thead>
                <tbody id="vocab-list-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    /* THIẾT LẬP GIAO DIỆN CHUẨN TRƯỚC KHI LOAD */
    (function() {
        const savedTheme = localStorage.getItem('app_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    /* ĐÃ SỬA: Cơ chế unlock âm thanh toàn diện cho iOS iPhone */
    function unlockAudio() {
        window.speechSynthesis.cancel(); // Xóa sạch hàng đợi bị treo trước đó
        const u = new SpeechSynthesisUtterance(' ');
        u.lang = 'ja-JP';
        u.volume = 0;
        window.speechSynthesis.speak(u);
        
        // Hủy bỏ các event listener sau khi đã kích hoạt thành công
        window.removeEventListener('click', unlockAudio);
        window.removeEventListener('touchstart', unlockAudio);
    }
    window.addEventListener('click', unlockAudio);
    window.addEventListener('touchstart', unlockAudio);

        "投":"ĐẦU","票":"PHIẾU","配":"PHỐI","給":"CẤP","欲":"DỤC","痛":"THỐNG","危":"NGUY","險":"HIỂM","願":"NGUYỆN","申":"THÂN",
        "込":"VÀO","払":"PHẤT","存":"TỒN","在":"TẠI","役":"DỊCH","割":"CÁT","基":"CƠ","准":"CHUẨN","備":"BỊ","営":"DOANH",
        "業":"NGHIỆP","幹":"CÁN","資":"TƯ","産":"SẢN","権":"QUYỀN","利":"LỢI","昨":"TẠC","漸":"TIỆM","急":"CẤP","詐":"TRÁ",
        "穏":"ỔN","作":"TÁC","浸":"TẨM","録":"LỤC","寝":"TẨM","尋":"TẦM","血":"HUYẾT","液":"DỊCH","正常":"CHÁNH THƯỜNG",
        "正":"CHÁNH","常":"THƯỜNG","追":"TRUY","降":"HÀNG","身":"THÂN","長":"TRƯỜNG","GIA":"GIA","賃":"NHẪM"
    };

    let db = JSON.parse(localStorage.getItem('jlpt_kanji_db')) || {
        "N3_Mondai_Demo": [
            { kanji: "得意", kana: "とくい", meaning: "Giỏi, sở trường, đắc ý", exampleJp: "彼女は料理が得意です。", exampleVi: "Cô ấy nấu ăn giỏi.", synonym: "上手", flipCount: 0, starred: false },
            { kanji: "包む", kana: "つつむ", meaning: "Gói, bọc", exampleJp: "プレゼントをきれいな紙で包む。", exampleVi: "Gói quà bằng giấy đẹp.", synonym: "", flipCount: 0, starred: false }
        ]
    };
    let currentList = [], activeWordIndex = 0, currentSheetName = "";

    window.onload = () => { 
        updateThemeToggleIcon();
        initSheetSelect(); 
    };

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app_theme', newTheme);
        updateThemeToggleIcon();
    }

    function updateThemeToggleIcon() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        document.getElementById('theme-toggle').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }

    function autoTranslateHanViet(text, customDb) {
        if (!text) return "";
        const activeDb = customDb || db;
        if (activeDb['_amHanViet'] && activeDb['_amHanViet'][text]) return activeDb['_amHanViet'][text];
        let result = [];
        for (let char of text) {
            if (/[\u4e00-\u9faf]/.test(char)) {
                if (activeDb['_amHanViet'] && activeDb['_amHanViet'][char]) result.push(activeDb['_amHanViet'][char]);
                else result.push(KANJI_DICTIONARY[char] || char);
            }
        }
        return result.length > 0 ? result.join(" ") : "";
    }

    function initSheetSelect() {
        const select = document.getElementById('lesson-select'); select.innerHTML = '';
        for (const sheet in db) {
            if (sheet === '_amHanViet') continue;
            let opt = document.createElement('option'); opt.value = sheet; opt.innerHTML = sheet; select.appendChild(opt);
        }
        loadSheet();
    }

    function handleExcelUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const newDb = {};

                if (workbook.SheetNames.includes('AmHanViet')) {
                    const worksheet = workbook.Sheets['AmHanViet'];
                    let rowIndex = 2; let emptyStreak = 0; const amHanVietMap = {};
                    while (emptyStreak < 30) {
                        const cellA = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 0})];
                        const valA = cellA && cellA.v !== undefined ? String(cellA.v).trim() : "";
                        if (valA) {
                            emptyStreak = 0;
                            const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                            const valB = cellB && cellB.v !== undefined ? String(cellB.v).trim() : "";
                            if (valB) amHanVietMap[valA] = valB.toUpperCase();
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    newDb['_amHanViet'] = amHanVietMap;
                } else if (db['_amHanViet']) {
                    newDb['_amHanViet'] = db['_amHanViet'];
                }

                workbook.SheetNames.forEach(sheetName => {
                    if (sheetName === 'AmHanViet') return;
                    const worksheet = workbook.Sheets[sheetName]; const sheetData = [];
                    let rowIndex = 2; let emptyStreak = 0;
                    while (emptyStreak < 30) {
                        const cellA = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 0})];
                        const valA = cellA && cellA.v !== undefined ? String(cellA.v).trim() : "";
                        if (valA) {
                            emptyStreak = 0;
                            const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                            const cellC = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 2})];
                            const cellD = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 3})];
                            const cellE = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 4})];
                            const cellF = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 5})];
                            const cellG = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 6})];
                            let hv = cellG && cellG.v !== undefined ? String(cellG.v).trim() : "";
                            if (!hv) hv = autoTranslateHanViet(valA, newDb);
                            sheetData.push({
                                kanji: valA, kana: cellB && cellB.v !== undefined ? String(cellB.v).trim() : "",
                                meaning: cellC && cellC.v !== undefined ? String(cellC.v).trim() : "",
                                exampleJp: cellD && cellD.v !== undefined ? String(cellD.v).trim() : "",
                                exampleVi: cellE && cellE.v !== undefined ? String(cellE.v).trim() : "",
                                synonym: cellF && cellF.v !== undefined ? String(cellF.v).trim() : "",
                                hanviet: hv, flipCount: 0, starred: false
                            });
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    if (sheetData.length > 0) newDb[sheetName] = sheetData;
                });

                if (Object.keys(newDb).filter(k => k !== '_amHanViet').length > 0) {
                    db = newDb; saveToLocalStorage(); alert("🎉 Đồng bộ dữ liệu Excel thành công!"); initSheetSelect();
                } else { alert("Lỗi: Không tìm thấy dữ liệu bài học phù hợp!"); }
            } catch (err) { alert("Đã xảy ra lỗi khi đọc file: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function loadSheet() {
        const selectVal = document.getElementById('lesson-select').value;
        currentSheetName = selectVal || Object.keys(db).filter(k => k !== '_amHanViet')[0];
        if (!currentSheetName) return;
        document.getElementById('only-bookmarked').checked = false;
        currentList = (db[currentSheetName] || []).map(w => { w.hanviet = autoTranslateHanViet(w.kanji); return w; });
        activeWordIndex = 0; updateFlashcard(); initQuiz(); initTyping(); resetFallingGame();
    }

    function saveToLocalStorage() { localStorage.setItem('jlpt_kanji_db', JSON.stringify(db)); }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
        document.querySelector('.view-list-btn').classList.remove('active');
        document.getElementById(tabId).style.display = 'block';
        if(btn.classList.contains('mode-btn')) btn.classList.add('active');
        if(tabId === 'tab-manager') renderManagerList();
    }

    function updateFlashcard() {
        if(currentList.length === 0) { document.getElementById('fc-front-text').innerText = "Trống"; return; }
        const word = currentList[activeWordIndex];
        document.getElementById('fc-front-text').innerText = word.kanji;
        
        const views = `👁️ ${word.flipCount || 0}`;
        document.querySelectorAll('.eye-icon').forEach(el => { el.innerText = views; });
        updateStarUI();

        document.getElementById('fc-hanviet').innerText = word.hanviet || autoTranslateHanViet(word.kanji);
        document.getElementById('fc-kana').innerText = word.kana ? `[ ${word.kana} ]` : '';
        document.getElementById('fc-meaning').innerText = word.meaning;

        const sameBox = document.getElementById('fc-same-box');
        if (word.synonym) { document.getElementById('fc-same').innerText = word.synonym; sameBox.style.display = 'block'; } else { sameBox.style.display = 'none'; }

        const exBox = document.getElementById('fc-ex-box');
        if (word.exampleJp) {
            document.getElementById('fc-ex-jp').innerText = word.exampleJp;
            document.getElementById('fc-ex-vi').innerText = word.exampleVi || '';
            exBox.style.display = 'flex';
        } else { exBox.style.display = 'none'; }

        document.getElementById('card-counter').innerText = `${activeWordIndex + 1} / ${currentList.length}`;
        document.getElementById('flashcard-container').classList.remove('flipped');
        
        document.getElementById('fc-gemini').href = `https://gemini.google.com/?q=Phân tích từ vựng N3: "${word.kanji}"`;
        document.getElementById('fc-mazii').href = `https://mazii.net/vi-VN/search/word/ja/${encodeURIComponent(word.kanji)}`;
    }

    function flipCard() {
        const card = document.getElementById('flashcard-container');
        if (card.classList.toggle('flipped') && currentList.length > 0) {
            currentList[activeWordIndex].flipCount = (currentList[activeWordIndex].flipCount || 0) + 1;
            saveToLocalStorage();
            document.querySelectorAll('.eye-icon').forEach(el => el.innerText = `👁️ ${currentList[activeWordIndex].flipCount}`);
        }
    }

    function nextCard() { if(activeWordIndex < currentList.length - 1) activeWordIndex++; else activeWordIndex = 0; updateFlashcard(); }
    function prevCard() { if(activeWordIndex > 0) activeWordIndex--; else activeWordIndex = currentList.length - 1; updateFlashcard(); }
    function shuffleCards() { currentList.sort(() => Math.random() - 0.5); activeWordIndex = 0; updateFlashcard(); }
    
    function toggleStar(e) { e.stopPropagation(); if(!currentList[activeWordIndex]) return; currentList[activeWordIndex].starred = !currentList[activeWordIndex].starred; saveToLocalStorage(); updateStarUI(); }
    function updateStarUI() {
        const word = currentList[activeWordIndex]; if(!word) return;
        document.querySelectorAll('.star-icon').forEach(el => { 
            el.innerText = word.starred ? "⭐" : "☆"; 
            el.style.color = word.starred ? "#ffc107" : ""; 
        });
    }
    function toggleStarredFilter() {
        const full = db[currentSheetName] || [];
        currentList = document.getElementById('only-bookmarked').checked ? full.filter(w => w.starred) : [...full];
        if(currentList.length === 0) { alert("Chưa có thẻ đánh dấu!"); document.getElementById('only-bookmarked').checked = false; currentList = [...full]; }
        activeWordIndex = 0; updateFlashcard();
    }

    /* ĐÃ SỬA: Sửa dứt điểm lỗi đọc âm thanh trên iPhone iOS Safari */
    function speakJapaneseText(e, text) { 
        if(e) e.stopPropagation(); 
        if(!text) return;
        
        // Buộc phải hủy hàng đợi trước đó trên iOS để tránh bị khóa luồng phát âm thanh
        window.speechSynthesis.cancel(); 
        
        const u = new SpeechSynthesisUtterance(text); 
        u.lang = 'ja-JP'; 
        u.rate = 0.88; 
        u.volume = 1.0;
        
        // Thử tìm giọng đọc tiếng Nhật chuẩn nếu hệ thống đã tải xong danh sách giọng
        if (window.speechSynthesis.getVoices().length > 0) {
            const jaVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
            if (jaVoice) u.voice = jaVoice;
        }
        
        window.speechSynthesis.speak(u); 
    }
    function speakCurrentWord(e) { const w = currentList[activeWordIndex]; speakJapaneseText(e, w.kana || w.kanji); }
    function speakCurrentExample(e) { speakJapaneseText(e, currentList[activeWordIndex].exampleJp); }
    function revealBlur(e, el) { e.stopPropagation(); el.classList.toggle('revealed'); }

    /* TRẮC NGHIỆM */
    let quizScore = 0, quizCount = 1, quizCurrent = null;
    function initQuiz() { quizScore = 0; quizCount = 1; document.getElementById('quiz-score').innerText = quizScore; loadNextQuiz(); }
    function loadNextQuiz() {
        if(currentList.length === 0) return; document.getElementById('quiz-next-btn').style.display = 'none';
        document.getElementById('quiz-counter').innerText = `${quizCount}/${currentList.length}`;
        quizCurrent = currentList[Math.floor(Math.random() * currentList.length)];
        document.getElementById('quiz-q').innerText = quizCurrent.kanji;
        let opts = [quizCurrent.meaning, ...[...new Set(currentList.map(w => w.meaning))].filter(m => m !== quizCurrent.meaning).sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
        const div = document.getElementById('quiz-opts'); div.innerHTML = '';
        opts.forEach(o => { const item = document.createElement('div'); item.className = 'quiz-option'; item.innerText = o; item.onclick = () => { if(document.getElementById('quiz-next-btn').style.display === 'block') return; if(o === quizCurrent.meaning) { item.classList.add('correct'); quizScore+=10; } else { item.classList.add('wrong'); Array.from(div.children).forEach(c => { if(c.innerText === quizCurrent.meaning) c.classList.add('correct'); }); } document.getElementById('quiz-score').innerText = quizScore; document.getElementById('quiz-next-btn').style.display = 'block'; }; div.appendChild(item); });
    }
    function nextQuiz() { quizCount++; loadNextQuiz(); }

    /* GÕ TỪ */
    let typeScore = 0, typeCurrent = null;
    function initTyping() { typeScore = 0; document.getElementById('type-score').innerText = typeScore; loadNextType(); }
    function loadNextType() { if(currentList.length === 0) return; typeCurrent = currentList[Math.floor(Math.random() * currentList.length)]; document.getElementById('type-q').innerText = typeCurrent.kanji; const i = document.getElementById('type-input'); i.value = ''; i.disabled = false; document.getElementById('type-feedback').innerText = ''; i.focus(); }
    function checkTyping(e) { if(e.key === 'Enter') { const i = document.getElementById('type-input'); const v = i.value.trim().toLowerCase(); i.disabled = true; if(v === typeCurrent.kana.toLowerCase() || v === typeCurrent.meaning.toLowerCase()) { typeScore+=10; document.getElementById('type-score').innerText = typeScore; document.getElementById('type-feedback').style.color = '#4caf50'; document.getElementById('type-feedback').innerText = 'Chính xác! 🎉'; setTimeout(loadNextType, 1200); } else { document.getElementById('type-feedback').style.color = '#f44336'; document.getElementById('type-feedback').innerText = `Đáp án: ${typeCurrent.kana} | ${typeCurrent.meaning}`; setTimeout(loadNextType, 2500); } } }

    /* KANJI RƠI */
    let fallInterval, gameTimer, fallPos = 0, fallScore = 0, fallLives = 3, fallCurrent = null, isFalling = false, timeLeft = 30;
    function resetFallingGame() { clearInterval(fallInterval); clearInterval(gameTimer); document.getElementById('falling-word').style.display = 'none'; document.getElementById('fall-start-btn').style.display = 'block'; document.getElementById('fall-input').disabled = true; isFalling = false; }
    function startFallingGame() {
        if(currentList.length === 0) return; fallScore = 0; fallLives = 3; timeLeft = 30; updateFallBoard();
        document.getElementById('fall-start-btn').style.display = 'none'; document.getElementById('fall-input').disabled = false; document.getElementById('fall-input').focus();
        gameTimer = setInterval(() => { timeLeft--; updateFallBoard(); if(timeLeft <= 0) { clearInterval(fallInterval); clearInterval(gameTimer); alert(`Hết giờ! Điểm của bạn: ${fallScore}`); resetFallingGame(); } }, 1000);
        spawnFalling();
    }
    function spawnFalling() {
        if(fallLives <= 0 || timeLeft <= 0) return; fallCurrent = currentList[Math.floor(Math.random() * currentList.length)];
        const el = document.getElementById('falling-word'); el.innerText = fallCurrent.kanji; el.style.display = 'block'; fallPos = 0; isFalling = true;
        clearInterval(fallInterval); fallInterval = setInterval(() => { fallPos += 2; el.style.top = fallPos + 'px'; if(fallPos > 220) { clearInterval(fallInterval); fallLives--; updateFallBoard(); if(fallLives <= 0) { alert('Hết mạng!'); resetFallingGame(); } else { spawnFalling(); } } }, 30);
    }
    function checkFall(e) { if(e.key === 'Enter' && isFalling) { const i = document.getElementById('fall-input'); const v = i.value.trim().toLowerCase(); if(v === fallCurrent.kana.toLowerCase() || v === fallCurrent.meaning.toLowerCase()) { clearInterval(fallInterval); fallScore+=10; updateFallBoard(); i.value = ''; spawnFalling(); } else { i.value = ''; } } }
    function updateFallBoard() { document.getElementById('fall-score').innerText = fallScore; document.getElementById('fall-lives').innerText = fallLives; document.getElementById('fall-timer').innerText = timeLeft; }

    /* DANH SÁCH MỞ RỘNG */
    function renderManagerList() {
        document.getElementById('manager-title').innerText = `Bài học: ${currentSheetName}`;
        const tbody = document.getElementById('vocab-list-tbody'); tbody.innerHTML = '';
        (db[currentSheetName] || []).forEach((w, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${index + 2}</td><td>${w.starred ? '⭐' : '☆'}</td><td><b>${w.kanji}</b></td><td style="color:#ff85a2; font-weight:bold; text-transform: uppercase;">${w.hanviet || autoTranslateHanViet(w.kanji)}</td><td>${w.kana}</td><td>${w.meaning}</td>`;
            tbody.appendChild(tr);
        });
    }
</script>
